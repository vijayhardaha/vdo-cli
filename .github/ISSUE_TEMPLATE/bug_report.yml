name: Bug Report
description: Create a report to help us improve
title: "[Bug] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report

        Thank you for reporting a bug! Please fill out the form below to help us investigate.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug here...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: |
        Steps to reproduce the behavior:
        1. Go to '...'
        2. Run '...'
        3. See error
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: Describe what should happen...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: A clear and concise description of what actually happened.
      placeholder: Describe what happened instead...
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: Command Used
      description: The exact vdo command you ran (e.g., `vdo dl <url> --split ig`)
      placeholder: vdo dl https://example.com --format mp4
    validations:
      required: false

  - type: input
    id: url
    attributes:
      label: Video URL (if applicable)
      description: The URL of the video you were trying to download/process
      placeholder: https://youtube.com/watch?v=...
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: What operating system are you using?
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: vdo Version
      description: Run `vdo --version` to get the version
      placeholder: 1.0.0
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: |
        Please include any error messages or logs here.
        **DO NOT include personal information or API keys.**
      placeholder: |
        $ vdo dl https://example.com
        Error: ...
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
      placeholder: Any other information...
    validations:
      required: false
