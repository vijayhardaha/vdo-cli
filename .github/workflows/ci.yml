name: CI

on:
  push:
    branches:
      - master
    paths:
      - "src/**"
      - "tests/**"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "tsconfig.json"
      - "package.json"
      - ".github/workflows/ci.yml"
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "bun"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript check
        run: bun run tsc

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

      - name: Test Coverage
        uses: actions/upload-artifact@v4
        if: github.event_name == 'pull_request'
        with:
          name: coverage
          path: coverage/
